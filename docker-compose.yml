services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: docsync
      POSTGRES_PASSWORD: docsync
      POSTGRES_DB: docsync
    volumes:
      - docsync_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docsync -d docsync"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  docsync_pg_data:
